name: quran_player
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  dio: ^5.9.2
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  fpdart: ^1.2.0
  get_it: ^9.2.1
  go_router: ^17.2.3
  google_fonts: ^8.1.0
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.17
  pretty_dio_logger: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#0c332b"
  adaptive_icon_background: "assets/icons/app_icon_background.png"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"

flutter_native_splash:
  color: "#0A1714"                 
  image: assets/splash/splash.png  
  android: true
  ios: true
  web: false
  fullscreen: false                
  android_12:
    color: "#0A1714"
    image: assets/splash/splash.png
    icon_background_color: "#0F3A30"  
